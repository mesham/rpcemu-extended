name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: bash setup-build-env.sh

      - name: Build and package (amd64, dynarec)
        run: |
          chmod +x build.sh setup-build-env.sh
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ./build.sh --deb --zip
          else
            ./build.sh --zip
          fi

      - name: Smoke test binary
        run: |
          file releases/linux/amd64/rpcemu-recompiler | grep -i ELF
          ls -la releases/linux/amd64/

      - name: Upload Linux amd64 release
        uses: actions/upload-artifact@v4
        with:
          name: rpcemu-linux-amd64
          path: |
            releases/linux/amd64/
            releases/linux/*.tar.gz
            releases/linux/amd64/*.deb
          if-no-files-found: error

  linux-arm64:
    # Native arm64 hosted runner (free for public repos). The ARM dynarec backend
    # does not exist, so arm64 uses the interpreter (--interpreter).
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: bash setup-build-env.sh

      - name: Build and package (arm64, interpreter)
        run: |
          chmod +x build.sh setup-build-env.sh
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ./build.sh --interpreter --deb --zip
          else
            ./build.sh --interpreter --zip
          fi

      - name: Smoke test binary
        run: |
          file releases/linux/arm64/rpcemu-interpreter | grep -i ELF
          ls -la releases/linux/arm64/

      - name: Upload Linux arm64 release
        uses: actions/upload-artifact@v4
        with:
          name: rpcemu-linux-arm64
          path: |
            releases/linux/arm64/
            releases/linux/*.tar.gz
            releases/linux/arm64/*.deb
          if-no-files-found: error

  windows-amd64:
    # Native Windows build with MinGW-w64 via MSYS2 (MINGW64). Ships the
    # recompiler (full-speed dynarec; the JIT supports the Windows x64 ABI).
    # Uses build-windows.sh (build.sh is apt/.deb-only).
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 / MinGW-w64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-wxwidgets3.2-msw
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-libvncserver

      - name: Build and stage release (native MSYS2)
        run: |
          chmod +x build-windows.sh
          ./build-windows.sh --zip

      - name: Smoke test binary (PE executable)
        run: |
          ls -la releases/windows/amd64/
          # Windows ships the recompiler (full-speed dynarec; the JIT now
          # supports the Windows x64 ABI).
          file releases/windows/amd64/rpcemu-recompiler.exe | grep -i 'PE32'

      - name: Upload Windows amd64 release
        uses: actions/upload-artifact@v4
        with:
          name: rpcemu-windows-amd64
          path: |
            releases/windows/amd64/
            releases/windows/*.zip
          if-no-files-found: error

  macos-x86_64:
    # Free Intel (macos-13) runners are effectively unavailable, so build the
    # x86_64 slice (WITH the dynarec) on an Apple Silicon runner: Apple clang
    # cross-compiles to x86_64 natively via CMAKE_OSX_ARCHITECTURES, we just
    # need x86_64 libraries (from a Rosetta x86_64 Homebrew - the arm64 Homebrew
    # in /opt/homebrew can't provide them) and Rosetta 2 to run the JIT test.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rosetta 2
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Install x86_64 Homebrew + dependencies
        run: |
          # A separate Intel Homebrew installs into /usr/local (the arm64
          # Homebrew lives in /opt/homebrew); both coexist. The install script
          # is downloaded by the outer shell, then executed under Rosetta so it
          # provisions the x86_64 tree.
          if [ ! -x /usr/local/bin/brew ]; then
            script="$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
            NONINTERACTIVE=1 arch -x86_64 /bin/bash -c "$script"
          fi
          arch -x86_64 /usr/local/bin/brew install cmake ninja pkg-config wxwidgets sdl2 libvncserver

      - name: Build x86_64 slice + test (Rosetta)
        run: |
          chmod +x build-macos.sh
          # Resolve wx-config / pkg-config / cmake from the x86_64 Homebrew
          # (/usr/local) so the slice links x86_64 libraries; clang emits x86_64
          # via CMAKE_OSX_ARCHITECTURES (set in build-macos.sh). The JIT test
          # binary is x86_64 and runs under Rosetta.
          export PATH="/usr/local/bin:$PATH"
          export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig"
          ./build-macos.sh --arch x86_64

      - name: Upload x86_64 slice
        uses: actions/upload-artifact@v4
        with:
          name: macos-slice-x86_64
          path: build-mac-x86_64/bin/
          if-no-files-found: error

  macos-arm64:
    # Apple Silicon runner: builds the arm64 slice. There is no ARM dynarec
    # backend, so arm64 uses the interpreter (RPCEMU_DYNAREC=OFF), mirroring the
    # Linux arm64 build. On Apple Silicon the x86_64 slice also runs via Rosetta.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja pkg-config wxwidgets sdl2 libvncserver

      - name: Build arm64 slice (interpreter) + test
        run: |
          chmod +x build-macos.sh
          ./build-macos.sh --arch arm64

      - name: Upload arm64 slice
        uses: actions/upload-artifact@v4
        with:
          name: macos-slice-arm64
          path: build-mac-arm64/bin/
          if-no-files-found: error

  macos-universal:
    # Fuse the two per-arch slices into a universal binary and stage the release.
    needs: [macos-x86_64, macos-arm64]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download x86_64 slice
        uses: actions/download-artifact@v4
        with:
          name: macos-slice-x86_64
          path: build-mac-x86_64/bin

      - name: Download arm64 slice
        uses: actions/download-artifact@v4
        with:
          name: macos-slice-arm64
          path: build-mac-arm64/bin

      - name: Fuse (lipo) + stage universal release
        run: |
          chmod +x build-macos.sh
          ./build-macos.sh --fuse --zip

      - name: Smoke test universal binary
        run: |
          lipo -archs releases/macos/universal/rpcemu
          file releases/macos/universal/rpcemu | grep -i 'universal'

      - name: Upload macOS universal release
        uses: actions/upload-artifact@v4
        with:
          name: rpcemu-macos-universal
          path: |
            releases/macos/universal/
            releases/macos/*.tar.gz
          if-no-files-found: error

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [linux-amd64, linux-arm64, windows-amd64, macos-universal]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: upload

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            upload/**/*.deb
            upload/**/*.tar.gz
            upload/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
